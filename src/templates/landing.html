<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{NAME}}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪔</text></svg>">

  <!-- OG Meta Tags -->
  <meta property="og:title" content="{{NAME}}">
  <meta property="og:description" content="{{TAGLINE}}">
  <meta property="og:image" content="{{HERO_IMAGE_URL}}">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{NAME}}">
  <meta name="twitter:description" content="{{TAGLINE}}">
  <meta name="twitter:image" content="{{HERO_IMAGE_URL}}">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#0a0a0a',
            card: 'rgba(255,255,255,0.03)',
            accent: '{{ACCENT_COLOR}}',
            glow: '{{GLOW_COLOR}}',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; }
    html { scroll-behavior: smooth; }
    body { background: #0a0a0a; }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .glass-strong {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(60px);
      -webkit-backdrop-filter: blur(60px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glow-border {
      border: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow: 0 0 30px -10px rgba(139, 92, 246, 0.2), inset 0 0 30px -10px rgba(139, 92, 246, 0.05);
    }
    .gradient-text {
      background: linear-gradient(135deg, {{ACCENT_COLOR}}, {{GLOW_COLOR}});
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-section {
      background-image: linear-gradient(to bottom, rgba(10,10,10,0.4), rgba(10,10,10,0.85) 70%, #0a0a0a), url('{{HERO_IMAGE_URL}}');
      background-size: cover;
      background-position: center;
    }
    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }
    .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.15));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 16px;
    }
    .feature-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 16px;
      opacity: 0.85;
      transition: opacity 0.3s ease;
    }
    .feature-card:hover .feature-img { opacity: 1; }
    .cta-btn {
      background: linear-gradient(135deg, {{ACCENT_COLOR}}, {{GLOW_COLOR}});
      transition: all 0.3s ease;
      box-shadow: 0 0 40px -10px {{ACCENT_COLOR}};
    }
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 60px -10px {{ACCENT_COLOR}};
    }
    .grid-pattern {
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float { animation: float 6s ease-in-out infinite; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }
    .genie-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(236,72,153,0.1));
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body class="bg-surface text-white min-h-screen grid-pattern antialiased">

  <!-- Nav -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/5">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-3">
      <a href="#" class="font-bold text-lg gradient-text">{{NAME}}</a>
      <div class="flex items-center gap-6 text-sm text-white/50">
        <a href="#features" class="hover:text-white transition-colors">Features</a>
        <a href="#details" class="hover:text-white transition-colors">Details</a>
        <a href="#signup" class="hover:text-white transition-colors">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section with Background Image -->
  <section class="hero-section relative overflow-hidden min-h-[85vh] flex items-center justify-center px-6">
    <div class="hero-glow"></div>
    <div class="relative z-10 text-center max-w-4xl mx-auto fade-in" style="padding-top:60px">
      <div class="inline-flex items-center gap-2 glass rounded-full px-4 py-2 text-sm text-white/60 mb-8">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
        {{STATUS_BADGE}}
      </div>
      <h1 class="text-5xl sm:text-7xl font-black tracking-tight mb-6 leading-[1.1]">
        <span class="gradient-text">{{NAME}}</span>
      </h1>
      <p class="text-xl sm:text-2xl text-white/60 font-light max-w-2xl mx-auto mb-10 leading-relaxed">
        {{TAGLINE}}
      </p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="#signup" class="cta-btn text-white font-semibold px-8 py-4 rounded-2xl text-lg">
          Get Started
        </a>
        <a href="#features" class="glass text-white/70 hover:text-white font-medium px-8 py-4 rounded-2xl text-lg transition-all hover:bg-white/5">
          Learn More
        </a>
      </div>
    </div>
  </section>

  <!-- Features Grid -->
  <section id="features" class="relative py-24 px-6">
    <div class="max-w-6xl mx-auto">
      <div class="text-center mb-16">
        <h2 class="text-3xl sm:text-4xl font-bold mb-4">What's Inside</h2>
        <p class="text-white/40 text-lg max-w-xl mx-auto">Everything you need, nothing you don't.</p>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {{FEATURES_HTML}}
      </div>
    </div>
  </section>

  <!-- Event Details (conditional) -->
  {{EVENT_SECTION}}

  <!-- Email Signup Section -->
  <section id="signup" class="py-24 px-6">
    <div class="max-w-3xl mx-auto text-center">
      <div class="glass-strong rounded-3xl p-12 glow-border">
        <h2 class="text-3xl sm:text-4xl font-bold mb-4 gradient-text">Ready?</h2>
        <p class="text-white/40 text-lg mb-8">{{CTA_TEXT}}</p>
        <form onsubmit="event.preventDefault();this.querySelector('button').textContent='You\'re in! \u2728';this.querySelector('input').disabled=true;this.querySelector('button').disabled=true;" class="flex flex-col sm:flex-row gap-3 max-w-lg mx-auto">
          <input type="email" placeholder="you@email.com" required class="flex-1 bg-white/5 border border-white/10 rounded-xl px-5 py-3 text-white placeholder-white/30 outline-none focus:border-white/20 transition-colors">
          <button type="submit" class="cta-btn text-white font-semibold px-8 py-3 rounded-xl text-base whitespace-nowrap">
            Join Now
          </button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="border-t border-white/5 py-8 px-6">
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="text-white/20 text-sm">
        {{CREATOR_LINE}}
      </div>
      <div class="genie-badge">
        Built by Genie &#129518; from a JellyJelly video
      </div>
    </div>
  </footer>

</body>
</html>
